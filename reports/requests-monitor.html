<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Referencioteca · Solicitudes</title>
  <style>
    :root {
      --bg: #0a0b11;
      --panel: #11131b;
      --panel-2: #171a24;
      --line: #2a2f42;
      --text: #eef1ff;
      --dim: #9ea5be;
      --ok: #35d07f;
      --warn: #ffd166;
      --chip: #1f2331;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 { margin: 0 0 6px 0; font-size: 28px; }
    .sub { color: var(--dim); margin-bottom: 16px; }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto auto auto;
      gap: 10px;
      margin-bottom: 14px;
    }
    .input, .select, .btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 10px;
      min-height: 40px;
      padding: 0 12px;
    }
    .btn { cursor: pointer; }
    .btn:hover { background: var(--panel-2); }
    .stats {
      margin: 10px 0 12px;
      color: var(--dim);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stats b { color: var(--text); }
    .table {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: var(--panel);
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      vertical-align: top;
      word-wrap: break-word;
    }
    th { color: var(--dim); font-weight: 600; }
    tr:last-child td { border-bottom: 0; }
    .chip {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid var(--line);
      font-size: 12px;
    }
    .message {
      max-height: 150px;
      overflow: auto;
      white-space: pre-wrap;
    }
    .small { color: var(--dim); font-size: 12px; }
    .row-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .row-btn {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      border-radius: 8px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .row-btn:hover { background: var(--panel-2); }
    .row-btn.resolve { border-color: #2f6f4f; color: var(--ok); }
    .row-btn.delete { border-color: #73403f; color: #ff9f9f; }
    .status-open { color: var(--warn); }
    .status-resolved { color: var(--ok); }
    @media (max-width: 920px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr { border-bottom: 1px solid var(--line); }
      td { border: 0; padding: 8px 10px; }
      td::before {
        content: attr(data-label);
        display: block;
        color: var(--dim);
        font-size: 12px;
        margin-bottom: 4px;
      }
    }
  </style>
</head>
<body>
  <div id="authGate" style="position:fixed;inset:0;background:#0a0b11;display:flex;align-items:center;justify-content:center;z-index:99;">
    <div style="width:min(420px,92vw);background:#11131b;border:1px solid #2a2f42;border-radius:12px;padding:18px;">
      <h2 style="margin:0 0 10px 0;">Acceso administrador</h2>
      <p style="margin:0 0 10px 0;color:#9ea5be;">Ingresa tu clave privada para ver solicitudes.</p>
      <input id="authInput" type="password" placeholder="Clave privada" style="width:100%;height:40px;border-radius:10px;border:1px solid #2a2f42;background:#0a0b11;color:#eef1ff;padding:0 10px;" />
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button id="authBtn" style="height:38px;border-radius:10px;border:1px solid #2a2f42;background:#eef1ff;color:#111;padding:0 12px;cursor:pointer;">Entrar</button>
      </div>
      <p id="authErr" style="min-height:18px;margin:8px 0 0 0;color:#ffadad;font-size:12px;"></p>
    </div>
  </div>
  <main class="wrap">
    <h1>Solicitudes de Referencioteca</h1>
    <div class="sub">Panel de solicitudes para revisar modificaciones, bajas y enlaces con error.</div>
    <div class="sub" id="originHint"></div>

    <div class="toolbar">
      <input id="q" class="input" placeholder="Buscar por proyecto, autor o texto" />
      <select id="type" class="select">
        <option value="all">Todos los tipos</option>
        <option value="modify">Modificar información</option>
        <option value="remove">Solicitud de baja</option>
        <option value="link">Notificar enlace</option>
      </select>
      <button id="refreshBtn" class="btn">Actualizar</button>
      <button id="exportCsv" class="btn">Exportar CSV</button>
      <button id="clearAll" class="btn">Vaciar</button>
    </div>

    <div class="stats" id="stats"></div>

    <section class="table">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Proyecto</th>
            <th>Detalle</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>

  <script>
    (function () {
      const ADMIN_KEY_HASH = 'f6010fcfc407a6d747534d8b08062c8f71ff02dcdc23a09f15066a44cb24d9fd'; // "ref-admin-2026-cambiar"
      const STORAGE_KEY = 'ref2d_admin_requests_v1';
      const REQUESTS_API_URL = 'https://script.google.com/macros/s/AKfycbwxazNeMlGlw2aFNLCF1L3B-ceWtH54qWYa_7FHRs8GjN0V3zmzXYgosdCP4cjGEWdjWQ/exec';
      const REQUESTS_API_KEY = 'ref123.teca';
      const AUTO_REFRESH_MS = 30000;
      const authGate = document.getElementById('authGate');
      const authInput = document.getElementById('authInput');
      const authBtn = document.getElementById('authBtn');
      const authErr = document.getElementById('authErr');
      const q = document.getElementById('q');
      const type = document.getElementById('type');
      const refreshBtn = document.getElementById('refreshBtn');
      const rows = document.getElementById('rows');
      const stats = document.getElementById('stats');
      const exportCsv = document.getElementById('exportCsv');
      const clearAll = document.getElementById('clearAll');
      const originHint = document.getElementById('originHint');
      let allItems = [];
      let refreshTimer = null;

      const esc = (v) => String(v || '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      const params = new URLSearchParams(window.location.search);

      async function sha256(text) {
        const data = new TextEncoder().encode(String(text || ''));
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      }

      async function tryAuth(inputKey) {
        const h = await sha256(inputKey);
        return h === ADMIN_KEY_HASH;
      }

      function loadLocal() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const list = raw ? JSON.parse(raw) : [];
          return Array.isArray(list) ? list : [];
        } catch (_) {
          return [];
        }
      }

      function saveLocal(list) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
      }

      async function loadRemote() {
        if (!REQUESTS_API_URL) return null;
        const url = new URL(REQUESTS_API_URL);
        url.searchParams.set('mode', 'list');
        if (REQUESTS_API_KEY) url.searchParams.set('apiKey', REQUESTS_API_KEY);
        try {
          const res = await fetch(url.toString(), { headers: { 'Accept': 'application/json' } });
          if (!res.ok) throw new Error('remote_list_failed');
          const data = await res.json();
          if (!data || !Array.isArray(data.items)) return [];
          return data.items;
        } catch (_) {
          return loadRemoteJsonp();
        }
      }

      function loadRemoteJsonp() {
        return new Promise((resolve, reject) => {
          if (!REQUESTS_API_URL) return resolve([]);
          const cbName = '__refReqCb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
          const script = document.createElement('script');
          const url = new URL(REQUESTS_API_URL);
          url.searchParams.set('mode', 'jsonp');
          url.searchParams.set('callback', cbName);
          if (REQUESTS_API_KEY) url.searchParams.set('apiKey', REQUESTS_API_KEY);

          const cleanup = () => {
            delete window[cbName];
            if (script.parentNode) script.parentNode.removeChild(script);
          };

          window[cbName] = (payload) => {
            cleanup();
            if (!payload || !Array.isArray(payload.items)) return resolve([]);
            resolve(payload.items);
          };

          script.onerror = () => {
            cleanup();
            reject(new Error('jsonp_failed'));
          };
          script.src = url.toString();
          document.head.appendChild(script);
          setTimeout(() => {
            if (window[cbName]) {
              cleanup();
              reject(new Error('jsonp_timeout'));
            }
          }, 10000);
        });
      }

      async function updateRemoteStatus(id, status) {
        if (!REQUESTS_API_URL) return false;
        const payload = new URLSearchParams();
        payload.set('mode', 'update');
        payload.set('apiKey', REQUESTS_API_KEY || '');
        payload.set('id', id);
        payload.set('status', status);
        const res = await fetch(REQUESTS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8', 'Accept': 'application/json' },
          body: payload.toString()
        });
        return res.ok;
      }

      async function deleteRemote(id) {
        if (!REQUESTS_API_URL) return false;
        const payload = new URLSearchParams();
        payload.set('mode', 'delete');
        payload.set('apiKey', REQUESTS_API_KEY || '');
        payload.set('id', id);
        const res = await fetch(REQUESTS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8', 'Accept': 'application/json' },
          body: payload.toString()
        });
        return res.ok;
      }

      function fmtDate(iso) {
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return '—';
        return d.toLocaleString('es-CL');
      }

      function filterList(list) {
        const text = (q.value || '').trim().toLowerCase();
        const t = type.value;
        return list.filter((it) => {
          if (t !== 'all' && it.type !== t) return false;
          if (!text) return true;
          const hay = [
            it.projectTitle,
            it.projectAuthor,
            it.message,
            it.requesterEmail,
            it.projectArea,
            it.projectYear,
            it.typeLabel
          ].join(' ').toLowerCase();
          return hay.includes(text);
        });
      }

      function render() {
        const all = allItems.slice();
        const list = filterList(all);
        const openCount = all.filter((x) => x.status !== 'resolved').length;
        const resolvedCount = all.filter((x) => x.status === 'resolved').length;

        stats.innerHTML = '<span>Total: <b>' + all.length + '</b></span>' +
          '<span>Abiertas: <b>' + openCount + '</b></span>' +
          '<span>Resueltas: <b>' + resolvedCount + '</b></span>' +
          '<span>Mostrando: <b>' + list.length + '</b></span>';

        if (originHint) {
          originHint.innerHTML = REQUESTS_API_URL
            ? 'Fuente: <b>panel central</b>. Auto-actualiza cada ' + Math.round(AUTO_REFRESH_MS / 1000) + 's.'
            : 'Fuente: <b>local</b>. Configura REQUESTS_API_URL para centralizar.';
        }
        clearAll.disabled = !!REQUESTS_API_URL;

        if (!list.length) {
          rows.innerHTML = '<tr><td colspan="6" class="small">Sin solicitudes.</td></tr>';
          return;
        }

        rows.innerHTML = list.map((it) => {
          const status = it.status === 'resolved' ? 'resuelta' : 'abierta';
          const link = it.projectUrl ? '<div class="small"><a href="' + esc(it.projectUrl) + '" target="_blank" rel="noopener">Abrir link</a></div>' : '<div class="small">Sin link</div>';
          const email = it.requesterEmail ? '<div class="small">Correo: ' + esc(it.requesterEmail) + '</div>' : '<div class="small">Correo: —</div>';

          return '<tr data-id="' + esc(it.id) + '">' +
            '<td data-label="Fecha">' + esc(fmtDate(it.createdAt)) + '</td>' +
            '<td data-label="Tipo"><span class="chip">' + esc(it.typeLabel || it.type || '—') + '</span></td>' +
            '<td data-label="Proyecto"><b>' + esc(it.projectTitle || '—') + '</b><div class="small">Autor: ' + esc(it.projectAuthor || '—') + '</div><div class="small">Área: ' + esc(it.projectArea || '—') + ' · Año: ' + esc(it.projectYear || '—') + '</div>' + link + '</td>' +
            '<td data-label="Detalle"><div class="message">' + esc(it.message || '') + '</div>' + email + '</td>' +
            '<td data-label="Estado"><span class="status-' + (it.status === 'resolved' ? 'resolved' : 'open') + '">' + status + '</span></td>' +
            '<td data-label="Acciones"><div class="row-actions"><button class="row-btn resolve" data-act="toggle">' + (it.status === 'resolved' ? 'Reabrir' : 'Resolver') + '</button><button class="row-btn delete" data-act="delete">Eliminar</button></div></td>' +
          '</tr>';
        }).join('');
      }

      rows.addEventListener('click', function (e) {
        const btn = e.target.closest('button[data-act]');
        if (!btn) return;
        const tr = e.target.closest('tr[data-id]');
        if (!tr) return;
        const id = tr.getAttribute('data-id');
        const list = allItems.slice();
        const idx = list.findIndex((x) => String(x.id) === String(id));
        if (idx < 0) return;
        const current = list[idx];
        const action = btn.dataset.act;
        const nextStatus = current.status === 'resolved' ? 'open' : 'resolved';

        if (REQUESTS_API_URL) {
          const op = action === 'toggle'
            ? updateRemoteStatus(String(id), nextStatus)
            : deleteRemote(String(id));
          op.then((ok) => {
            if (!ok) return;
            syncAndRender(true);
          });
          return;
        }

        if (action === 'toggle') {
          list[idx].status = nextStatus;
        } else if (action === 'delete') {
          list.splice(idx, 1);
        }
        saveLocal(list);
        allItems = list;
        render();
      });

      exportCsv.addEventListener('click', function () {
        const list = filterList(allItems);
        const head = ['id','createdAt','type','typeLabel','projectTitle','projectAuthor','projectYear','projectArea','projectUrl','requesterEmail','message','status'];
        const rowsCsv = [head.join(',')];
        list.forEach((it) => {
          const vals = head.map((k) => {
            const v = String(it[k] || '').replace(/"/g, '""');
            return '"' + v + '"';
          });
          rowsCsv.push(vals.join(','));
        });
        const blob = new Blob([rowsCsv.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'solicitudes-referencioteca.csv';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      });

      clearAll.addEventListener('click', function () {
        if (!window.confirm('¿Vaciar todas las solicitudes guardadas localmente?')) return;
        if (REQUESTS_API_URL) {
          return;
        }
        saveLocal([]);
        allItems = [];
        render();
      });

      q.addEventListener('input', render);
      type.addEventListener('change', render);
      refreshBtn.addEventListener('click', () => syncAndRender(true));

      async function syncAndRender(showLoading) {
        if (showLoading && stats) {
          stats.innerHTML = '<span>Cargando solicitudes...</span>';
        }
        if (REQUESTS_API_URL) {
          try {
            allItems = await loadRemote();
            render();
            return;
          } catch (_) {
            // fallback local si endpoint falla
          }
        }
        allItems = loadLocal();
        render();
      }

      async function unlockIfAllowed() {
        const keyFromUrl = params.get('k') || '';
        if (keyFromUrl && await tryAuth(keyFromUrl)) {
          authGate.style.display = 'none';
          syncAndRender(true);
          if (refreshTimer === null) {
            refreshTimer = setInterval(() => syncAndRender(false), AUTO_REFRESH_MS);
          }
          return;
        }
        authBtn.addEventListener('click', async function () {
          const ok = await tryAuth(authInput.value.trim());
          if (!ok) {
            authErr.textContent = 'Clave inválida.';
            return;
          }
          authErr.textContent = '';
          authGate.style.display = 'none';
          syncAndRender(true);
          if (refreshTimer === null) {
            refreshTimer = setInterval(() => syncAndRender(false), AUTO_REFRESH_MS);
          }
        });
        authInput.addEventListener('keydown', async function (e) {
          if (e.key !== 'Enter') return;
          authBtn.click();
        });
      }

      unlockIfAllowed();
    })();
  </script>
</body>
</html>
